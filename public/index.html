<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SWA Retro Trivia: Ultimate</title>
    <style>
        :root {
            --swa-blue: #111b4d; 
            --swa-red: #E8112d;  
            --swa-yellow: #F7D116; 
            --swa-light-blue: #304CB2; 
            --swa-silver: #A7A9AC; 
            /* NEW NIGHT SKY GRADIENT */
            --retro-sky-top: #0d122b;
            --retro-sky-mid: #1a2a6c;
            --retro-sky-bot: #5b3e75;
            --ground-gray: #333333;
        }

        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Courier New', Courier, monospace; background-color: var(--swa-blue); }
        body { display: flex; justify-content: center; align-items: center; color: white; text-align: center; }

        /* --- LAYOUT --- */
        #game-layout { position: relative; z-index: 10; display: flex; justify-content: center; align-items: center; width: 100%; height: 100%; padding: 20px; box-sizing: border-box; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        #game-card { background-color: rgba(17, 27, 77, 0.85); backdrop-filter: blur(5px); padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 3px solid var(--swa-yellow); max-width: 500px; width: 100%; display: flex; flex-direction: column; align-items: center; box-sizing: border-box; transition: max-width 0.5s ease; margin: auto; }

        /* General Styles */
        h1 { color: var(--swa-yellow); text-transform: uppercase; letter-spacing: 2px; margin-top: 0; text-shadow: 2px 2px 0 #000; }
        .btn { font-family: 'Courier New', Courier, monospace; padding: 15px 30px; margin: 10px; font-size: 18px; cursor: pointer; border: 4px solid white; border-radius: 0; font-weight: bold; transition: all 0.2s ease; box-shadow: 4px 4px 0 rgba(0,0,0,0.5); width: 100%; max-width: 400px; box-sizing: border-box; text-transform: uppercase; }
        .hidden { display: none !important; }
        #timer { font-size: 60px; font-weight: bold; color: var(--swa-yellow); margin: 15px; transition: color 0.3s; text-shadow: 4px 4px 0 rgba(0,0,0,0.8); }
        input { font-family: 'Courier New', Courier, monospace; padding: 15px; font-size: 18px; border: 4px solid var(--swa-yellow); background: rgba(0,0,0,0.5); color: white; text-align: center; width: 100%; max-width: 300px; text-transform: uppercase;}

        /* --- ULTIMATE 8-BIT BACKGROUND --- */
        .retro-background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, var(--retro-sky-top), var(--retro-sky-mid) 40%, var(--retro-sky-bot) 70%, #d9d9d9 70%, #999999 71%, var(--ground-gray) 71%); z-index: 0; image-rendering: pixelated; }

        /* STARS */
        .star { position: absolute; background: white; width: 2px; height: 2px; border-radius: 50%; animation: twinkle 3s infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; transform: scale(1.2); } }

        /* MOON */
        .moon { position: absolute; top: 5%; right: 10%; width: 40px; height: 40px; background: var(--swa-yellow); border-radius: 50%; box-shadow: -10px 0 0 0 var(--retro-sky-top); } /* Simple CSS crescent */

        /* CLOUDS (Increased) */
        .cloud { position: absolute; background: white; opacity: 0.6; animation: moveClouds linear infinite; }
        .cloud-shape { width: 20px; height: 20px; box-shadow: -20px 0 white, 20px 0 white, 0 -20px white, 0 20px white, -40px 20px white, 40px 20px white, -20px 40px white, 20px 40px white; }
        @keyframes moveClouds { from { transform: translateX(110vw); } to { transform: translateX(-60vw); } }

        /* AIRPORT GROUND EFFECTS */
        .terminal { position: absolute; bottom: 29%; left: 10%; width: 120px; height: 70px; background: #666; box-shadow: 20px -20px #666, 150px 0 #666, 170px 0 #666; }
        .terminal-window { position: absolute; top: 10px; left: 10px; width: 10px; height: 10px; background: #ffff99; box-shadow: 20px 0 #ffff99, 40px 0 #ffff99, 150px 0 #ffff99; animation: lightsOn infinite 5s; }
        @keyframes lightsOn { 0%, 40%, 100% { opacity: 1; } 50%, 90% { opacity: 0.2; } }

        /* BIRDS */
        .bird-flock { position: absolute; width: 50px; height: 30px; animation: moveFlock linear infinite; }
        .bird { position: absolute; background: black; width: 4px; height: 2px; box-shadow: -4px -2px black, 4px -2px black; animation: birdFlap 0.4s infinite; }
        @keyframes birdFlap { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
        @keyframes moveFlock { from { transform: translateX(110vw) translateY(0); } to { transform: translateX(-50vw) translateY(5vh); } }

        /* SWA PLANES (Increased Density & Sizes) */
        .plane { position: absolute; z-index: 1; image-rendering: pixelated;}
        .plane::before { content: ''; position: absolute; background: var(--swa-blue); } /* Body */
        .plane::after { content: ''; position: absolute; } /* Tail/Wings */

        /* Plane Base Art Rules */
        .plane.swa-livery::after { background: linear-gradient(to bottom, var(--swa-red) 33%, var(--swa-yellow) 33% 66%, var(--swa-blue) 66%); }

        /* Plane Animations */
        @keyframes planeTakeoff { 0% { transform: translate(0, 0) rotate(0deg); opacity: 0; } 5% { opacity: 1; } 30% { transform: translate(40vw, -10vh) rotate(-15deg); } 100% { transform: translate(120vw, -50vh) rotate(-20deg); opacity: 0; } }
        @keyframes planeLanding { 0% { transform: translate(0, 0) scaleX(-1) rotate(0deg); opacity: 0; } 5% { opacity: 1; } 70% { transform: translate(-80vw, 30vh) scaleX(-1) rotate(5deg); } 100% { transform: translate(-120vw, 35vh) scaleX(-1) rotate(0deg); opacity: 0; } }

        /* Large Planes (Foreground) */
        .plane-lg { width: 120px; height: 30px; }
        .plane-lg::before { left: 0; top: 8px; width: 90px; height: 14px; box-shadow: 7px -7px var(--swa-blue); }
        .plane-lg::after { right: 0; top: 0; width: 22px; height: 30px; box-shadow: -50px 22px var(--swa-silver), -70px 22px var(--swa-silver); }

        /* Medium Planes */
        .plane-md { width: 80px; height: 20px; }
        .plane-md::before { left: 0; top: 5px; width: 60px; height: 10px; box-shadow: 5px -5px var(--swa-blue); }
        .plane-md::after { right: 0; top: 0; width: 15px; height: 20px; box-shadow: -35px 15px var(--swa-silver), -50px 15px var(--swa-silver); }

        /* UFO (Fast & Retro) */
        .ufo { position: absolute; top: 20%; left: -100px; width: 50px; height: 20px; z-index: 2; animation: ufoZip 12s linear infinite; animation-delay: 5s; }
        .ufo-body { position: absolute; width: 50px; height: 12px; background: #999; border-radius: 50px; top: 4px; box-shadow: inset -5px -5px 0 rgba(0,0,0,0.3); }
        .ufo-dome { position: absolute; width: 20px; height: 10px; background: #66ff66; border-radius: 50px 50px 0 0; top: -4px; left: 15px; opacity: 0.8; }
        .ufo-lights { position: absolute; bottom: 1px; left: 10px; width: 5px; height: 5px; background: var(--swa-red); border-radius: 50%; box-shadow: 10px 0 var(--swa-yellow), 20px 0 var(--swa-red), 30px 0 var(--swa-yellow); animation: blinkUfo 0.3s infinite; }
        @keyframes blinkUfo { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        @keyframes ufoZip { 0% { transform: translateX(0) translateY(0); } 10% { transform: translateX(20vw) translateY(-5vh); } 20% { transform: translateX(50vw) translateY(5vh); } 30% { transform: translateX(120vw) translateY(0); } 100% { transform: translateX(120vw); } } /* Faster zip, then long wait */

        /* --- SROLLBARS (Same as before) --- */
        .host-panel::-webkit-scrollbar, #game-layout::-webkit-scrollbar { width: 10px; }
        .host-panel::-webkit-scrollbar-track, #game-layout::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.3); }
        .host-panel::-webkit-scrollbar-thumb, #game-layout::-webkit-scrollbar-thumb { background: var(--swa-yellow); border: 1px solid var(--swa-blue); }
        .host-panel::-webkit-scrollbar-thumb:hover, #game-layout::-webkit-scrollbar-thumb:hover { background: var(--swa-red); }

        /* --- HOST/GAME LAYOUTS (Same as before) --- */
        #host-screen { width: 100%; box-sizing: border-box; }
        .host-header-controls { display: flex; justify-content: space-around; align-items: center; margin-bottom: 20px; flex-wrap: wrap;}
        .host-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; text-align: left; }
        .host-panel { background: rgba(0,0,0,0.6); border: 2px solid var(--swa-silver); padding: 15px; height: 350px; overflow-y: auto; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; font-size: 14px; text-shadow: 1px 1px 0 #000; }
        .host-panel h3 { margin-top: 0; color: var(--swa-yellow); text-align: center; font-size: 18px; border-bottom: 2px solid var(--swa-silver); padding-bottom: 10px; }
        .host-panel ul { list-style: none; padding: 0; margin: 0; }
        .host-panel li { padding: 8px 0; border-bottom: 1px dashed rgba(255,255,255,0.2); }

        /* Responsiveness */
        @media (max-width: 768px) {
            #game-layout { padding: 10px; align-items: flex-start; } 
            #game-card { padding: 15px; border-width: 2px; margin-top: 20px; margin-bottom: 40px; }
            h1 { font-size: 22px; }
            .btn { font-size: 16px; padding: 12px 20px; }
            #timer { font-size: 45px; }
            .host-header-controls { flex-direction: column; gap: 15px; text-align: center; }
            .host-grid { grid-template-columns: 1fr; }
            .host-panel { height: 280px; } 
        }
    </style>
</head>
<body>

    <div class="retro-background">
        <div class="moon"></div>
        <div id="stars-container"></div>

        <div class="cloud" style="top: 10%; animation-duration: 60s; animation-delay: -10s;"><div class="cloud-shape" style="transform: scale(1.5);"></div></div>
        <div class="cloud" style="top: 25%; animation-duration: 45s; animation-delay: -30s;"><div class="cloud-shape"></div></div>
        <div class="cloud" style="top: 15%; animation-duration: 80s; animation-delay: -50s; opacity: 0.3;"><div class="cloud-shape" style="transform: scale(2);"></div></div>
        <div class="cloud" style="top: 35%; animation-duration: 50s; animation-delay: -5s;"><div class="cloud-shape" style="transform: scale(0.8);"></div></div>
        
        <div class="bird-flock" style="top: 20%; animation-duration: 30s;">
            <div class="bird" style="top: 0; left: 0;"></div>
            <div class="bird" style="top: 10px; left: 15px; animation-delay: 0.1s;"></div>
            <div class="bird" style="top: -5px; left: 30px; animation-delay: 0.2s;"></div>
        </div>
        <div class="bird-flock" style="top: 40%; animation-duration: 25s; animation-delay: 10s; transform: scale(0.6);">
            <div class="bird" style="top: 0; left: 0;"></div>
            <div class="bird" style="top: 10px; left: 20px; animation-delay: 0.1s;"></div>
        </div>

        <div class="ufo">
            <div class="ufo-dome"></div>
            <div class="ufo-body"></div>
            <div class="ufo-lights"></div>
        </div>

        <div class="plane plane-md swa-livery plane-takeoff" style="bottom: 35%; animation-duration: 25s; animation-delay: -5s; transform: scale(0.5); opacity: 0.5;"></div>
        <div class="plane plane-md swa-livery plane-landing" style="top: 15%; animation-duration: 30s; animation-delay: -15s; transform: scale(0.6) scaleX(-1); opacity: 0.6;"></div>

        <div class="plane plane-md swa-livery plane-takeoff" style="bottom: 35%; animation-duration: 20s; animation-delay: 2s;"></div>
        <div class="plane plane-md swa-livery plane-landing" style="top: 10%; animation-duration: 25s; animation-delay: 12s;"></div>

        <div class="plane plane-lg swa-livery plane-takeoff" style="bottom: 32%; left: -150px; animation-duration: 15s; animation-delay: 8s; z-index: 2;"></div>
        <div class="plane plane-lg swa-livery plane-landing" style="top: 5%; right: -150px; animation-duration: 18s; animation-delay: 20s; z-index: 2;"></div>

        <div class="terminal"><div class="terminal-window"></div></div>
    </div>

    <div id="game-layout">
        <div id="game-card">
            <h1 class="animate-fade">SWA Retro Trivia</h1>
            
            <div id="login-screen" class="animate-fade" style="width: 100%;">
                <input type="text" id="username" placeholder="ENTER NAME" maxlength="20">
                <br><br>
                <button class="btn btn-b" onclick="joinGame()">JOIN GAME</button>
                <br><br><br>
                <button class="btn" style="background: transparent; border: 2px solid white; color: white; box-shadow: none;" onclick="becomeHost()">I AM THE HOST</button>
            </div>

            <div id="host-screen" class="hidden animate-fade">
                <div class="host-header-controls">
                    <div>
                        <h2 style="color: var(--swa-yellow); text-shadow: 2px 2px 0 #000; margin: 0;">COMMAND CENTER</h2>
                        <h3 id="player-count" style="margin: 5px 0;">PLAYERS: 0</h3>
                    </div>
                    <button id="start-btn" class="btn btn-c" onclick="startQuestion()">START GAME</button>
                    <div id="timer-host" class="hidden" style="font-size:24px; color: var(--swa-yellow); font-weight: bold;">Q TIME: <span id="time-left-host">20</span>s</div>
                </div>

                <div class="host-grid">
                    <div class="host-panel">
                        <h3>🟢 LIVE USERS</h3>
                        <ul id="host-user-list"></ul>
                    </div>
                    <div class="host-panel">
                        <h3>🏆 LIVE RANKING</h3>
                        <ul id="host-live-leaderboard"></ul>
                    </div>
                    <div class="host-panel">
                        <h3>📋 QUESTIONS GUIDE</h3>
                        <ul id="host-questions-list"></ul>
                    </div>
                </div>
            </div>

            <div id="game-screen" class="hidden" style="width: 100%;">
                <div id="question-box" class="animate-slide hidden">
                    <h2 id="question-text" style="margin:0; font-size: 20px;">WAITING FOR HOST TO START...</h2>
                </div>
                <div id="timer">20</div>
                <div id="options" class="hidden animate-fade" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
                    <button class="btn btn-a" onclick="submitAnswer(0)" id="opt0">A</button>
                    <button class="btn btn-b" onclick="submitAnswer(1)" id="opt1">B</button>
                    <button class="btn btn-c" onclick="submitAnswer(2)" id="opt2">C</button>
                    <button class="btn btn-d" onclick="submitAnswer(3)" id="opt3">D</button>
                </div>
                <div id="wait-msg" class="hidden animate-fade">
                    <h3 style="color: var(--swa-yellow); text-shadow: 2px 2px 0 #000;">✈️ ANSWERED!</h3>
                    <p style="font-size: 14px;">PREPARE FOR LANDING...</p>
                </div>
            </div>

            <div id="leaderboard-screen" class="hidden animate-slide" style="width: 100%;">
                <h2 style="color: var(--swa-yellow); margin-bottom: 10px; text-shadow: 2px 2px 0 #000;">TOP 10</h2>
                <ol id="leaderboard"></ol>
                <h3 id="leaderboard-timer" style="color: white; margin-top: 15px; font-size: 20px; text-shadow: 2px 2px 0 #000;">NEXT IN: 10s</h3>
            </div>

            <div id="podium-screen" class="hidden animate-slide" style="width: 100%;">
                <h2 style="color: var(--swa-yellow); font-size: 30px; margin-bottom: 20px; text-shadow: 3px 3px 0 #000;">🏆 CHAMPION 🏆</h2>
                <ol id="podium"></ol>
                <br>
                <div id="restart-container"></div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let isHost = false;
        let timerInterval;

        // Audio setup (ensure files exist in public folder)
        const bgMusic = new Audio('/8bit-loop.mp3');
        bgMusic.loop = true;
        bgMusic.volume = 0.4; 

        const epicEndingMusic = new Audio('/punch-out-ending.mp3');
        epicEndingMusic.volume = 0.9; 

        // --- BACKGROUND GENERATORS ---
        function generateStars() {
            const container = document.getElementById('stars-container');
            const starCount = 50;
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.top = Math.random() * 65 + '%'; // Only in top portion of sky
                star.style.left = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                container.appendChild(star);
            }
        }
        generateStars(); // Run immediately

        // --- GAME LOGIC (Unchanged) ---
        function becomeHost() {
            socket.emit('claimHost');
        }

        socket.on('hostClaimed', (data) => {
            if (data.success) {
                isHost = true;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('host-screen').classList.remove('hidden');
                document.getElementById('game-card').style.maxWidth = '1000px'; 
                
                const qList = document.getElementById('host-questions-list');
                qList.innerHTML = '';
                data.questions.forEach((q, i) => {
                    let li = document.createElement('li');
                    li.innerHTML = `<strong style="color: white;">Q${i+1}:</strong> ${q.q}<br><i style="color:var(--swa-yellow)">Ans: ${q.options[q.ans]}</i>`;
                    qList.appendChild(li);
                });
            } else {
                alert('ACCESS DENIED: Another user is already hosting this game!');
            }
        });

        function joinGame() {
            const name = document.getElementById('username').value.trim();
            if(!name) return alert('ENTER YOUR NAME TO BOARD!');
            socket.emit('join', name);
        }

        socket.on('joinSuccess', () => {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('question-box').classList.remove('hidden');
            document.getElementById('question-text').innerText = "WAITING FOR HOST TO START...";
            
            if (!isHost) {
                 bgMusic.play().catch(e => console.log("Waiting for interaction"));
            }
        });

        socket.on('joinError', (errorMsg) => {
            alert(errorMsg); 
        });

        socket.on('updatePlayers', (players) => {
            if(isHost) {
                document.getElementById('player-count').innerText = `PLAYERS: ${players.length}`;
                
                const userList = document.getElementById('host-user-list');
                userList.innerHTML = '';
                players.forEach(p => {
                    let li = document.createElement('li');
                    li.innerText = p.name + (p.hasAnswered ? " ✅" : " ⏳");
                    userList.appendChild(li);
                });

                const sorted = [...players].sort((a,b) => b.score - a.score).slice(0, 10);
                const liveRank = document.getElementById('host-live-leaderboard');
                liveRank.innerHTML = '';
                sorted.forEach((p, i) => {
                    let li = document.createElement('li');
                    li.innerText = `${i+1}. ${p.name} - ${p.score} PTS`;
                    liveRank.appendChild(li);
                });
            }
        });

        function startQuestion() {
            const startBtn = document.getElementById('start-btn');
            if (startBtn) startBtn.classList.add('hidden'); 
            
            if (isHost && bgMusic.paused) {
                bgMusic.play().catch(e => console.log("Waiting for interaction"));
            }
            
            socket.emit('startQuestion');
        }

        socket.on('newQuestion', (data) => {
            document.getElementById('leaderboard-screen').classList.add('hidden');
            
            const qBox = document.getElementById('question-box');
            qBox.classList.remove('animate-slide');
            void qBox.offsetWidth; 
            qBox.classList.add('animate-slide');

            if(!isHost) {
                document.getElementById('game-screen').classList.remove('hidden');
                document.getElementById('question-box').classList.remove('hidden');
                document.getElementById('question-text').innerText = data.question.q;
                document.getElementById('opt0').innerText = `A) ${data.question.options[0]}`;
                document.getElementById('opt1').innerText = `B) ${data.question.options[1]}`;
                document.getElementById('opt2').innerText = `C) ${data.question.options[2]}`;
                document.getElementById('opt3').innerText = `D) ${data.question.options[3]}`;
                document.getElementById('options').classList.remove('hidden');
                document.getElementById('wait-msg').classList.add('hidden');
            }
            startTimer();
        });

        function submitAnswer(index) {
            socket.emit('answer', index);
            document.getElementById('options').classList.add('hidden');
            document.getElementById('wait-msg').classList.remove('hidden');
        }

        function startTimer() {
            let timeLeft = 20;
            const timerEl = document.getElementById('timer');
            timerEl.classList.remove('timer-warning');
            
            if(!isHost) timerEl.innerText = timeLeft;
            if(isHost) {
                document.getElementById('timer-host').classList.remove('hidden');
                document.getElementById('time-left-host').innerText = timeLeft;
            }
            
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                if(!isHost) {
                    timerEl.innerText = timeLeft;
                    if(timeLeft <= 5) timerEl.classList.add('timer-warning'); 
                }
                if(isHost) document.getElementById('time-left-host').innerText = timeLeft;
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timerEl.classList.remove('timer-warning');
                    if(isHost) socket.emit('endQuestion');
                }
            }, 1000);
        }

        socket.on('leaderboard', (top10) => {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('leaderboard-screen').classList.remove('hidden');
            const list = document.getElementById('leaderboard');
            list.innerHTML = '';
            top10.forEach((p, index) => {
                let li = document.createElement('li');
                li.innerText = `${index + 1}. ${p.name} - ${p.score} PTS`;
                list.appendChild(li);
            });

            let boardTimeLeft = 10;
            const lbTimerEl = document.getElementById('leaderboard-timer');
            lbTimerEl.innerText = `NEXT IN: ${boardTimeLeft}s`;
            
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                boardTimeLeft--;
                lbTimerEl.innerText = `NEXT IN: ${boardTimeLeft}s`;
                
                if (boardTimeLeft <= 0) {
                    clearInterval(timerInterval);
                    if (isHost) startQuestion(); 
                }
            }, 1000);
        });

        socket.on('gameOver', (podium) => {
            clearInterval(timerInterval); 
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('leaderboard-screen').classList.add('hidden');
            document.getElementById('host-screen').classList.add('hidden');
            document.getElementById('podium-screen').classList.remove('hidden');
            const list = document.getElementById('podium');
            list.innerHTML = '';
            
            bgMusic.pause();
            bgMusic.currentTime = 0;
            epicEndingMusic.play().catch(err => console.log("Audio blocked"));

            podium.forEach((p, i) => {
                let li = document.createElement('li');
                if (i === 0) {
                    li.innerText = `🥇 \n ${p.name} \n ${p.score} PTS`;
                } else {
                    li.innerText = `${i+1} PLACE: ${p.name} - ${p.score} PTS`;
                }
                list.appendChild(li);
            });

            const restartContainer = document.getElementById('restart-container');
            if (isHost) {
                document.getElementById('game-card').style.maxWidth = '1000px';
                restartContainer.innerHTML = '<button class="btn btn-c" onclick="restartGame()" style="max-width: 250px;">RESTART GAME</button>';
            } else {
                restartContainer.innerHTML = '<p style="color: var(--swa-yellow); font-weight: bold;">WAITING FOR HOST TO RESTART...</p>';
            }
        });

        function restartGame() {
            socket.emit('restartGame');
        }

        socket.on('gameReset', () => {
            epicEndingMusic.pause();
            epicEndingMusic.currentTime = 0;
            clearInterval(timerInterval);

            document.getElementById('podium-screen').classList.add('hidden');
            
            if (isHost) {
                document.getElementById('host-screen').classList.remove('hidden');
                document.getElementById('start-btn').classList.remove('hidden'); 
            } else {
                document.getElementById('game-screen').classList.remove('hidden');
                document.getElementById('question-text').innerText = "WAITING FOR HOST TO START...";
                document.getElementById('options').classList.add('hidden');
                document.getElementById('wait-msg').classList.add('hidden');
                document.getElementById('timer').innerText = "20";
                
                bgMusic.play().catch(e => console.log("Audio blocked"));
            }
        });
    </script>
</body>
</html>
